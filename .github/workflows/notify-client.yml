name: Notify client repo on spec change

on:
  push:
    branches: [main]
    paths:
      - "openapi.json"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute spec sha
        id: sha
        run: echo "sha=$(sha256sum openapi.json | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Trigger regenerate in client repo
        env:
          GH_TOKEN: ${{ secrets.CLIENT_REPO_DISPATCH_TOKEN }}
          CLIENT_REPO: ${{ vars.CLIENT_REPO }}
          SPEC_SHA: ${{ steps.sha.outputs.sha }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          : "${GH_TOKEN:?missing CLIENT_REPO_DISPATCH_TOKEN secret}"
          : "${CLIENT_REPO:?missing CLIENT_REPO variable (e.g. owner/open-api-client-test)}"

          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${CLIENT_REPO}/dispatches" \
            -d "$(jq -n \
                --arg sha "$SPEC_SHA" \
                --arg commit "$COMMIT_SHA" \
                --arg ref "${GITHUB_REF_NAME}" \
                '{event_type: "openapi-spec-updated", client_payload: {spec_sha: $sha, source_commit: $commit, source_ref: $ref}}')"
